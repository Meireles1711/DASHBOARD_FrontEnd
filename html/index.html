<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Monitoramento — Seccionadora Industrial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ==========================================================================
     Este HTML só tem estrutura e IDs. Nenhum texto/cor "de estado" fica
     fixo aqui — tudo é preenchido dinamicamente pelo api.js a partir dos
     dados que vierem do backend (Node.js). Ver api.js para a lógica.
     ========================================================================== -->

<div class="screen">

  <header class="header">
    <h1>Painel de Monitoramento</h1>
    <p>Seccionadora Industrial</p>
  </header>

  <div style="text-align:center;">
    <span class="state-badge" id="stateBadge">—</span>
  </div>

  <div class="grid" id="grid">

    <!-- ============ CARD: STATUS DA MÁQUINA ============ -->
    <section class="card col-status">
      <h2>Status da Máquina</h2>
      <div class="status-icon-row">
        <div class="status-icon-circle" id="statusIconCircle"></div>
        <div>
          <div class="status-title" id="statusTitle">—</div>
          <div class="status-subtitle" id="statusSubtitle">—</div>
        </div>
      </div>

      <div class="metric-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>Horas de Operação</span>
        <span class="metric-value" id="metricHoras">—</span>
      </div>
      <div class="metric-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 16l9-9 4 4-9 9H4v-4z"/><path d="M13 7l4 4"/></svg>
        <span>Cortes Realizados</span>
        <span class="metric-value" id="metricCortes">—</span>
      </div>
      <div class="metric-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.55 1.55M7.15 16.85 5.6 18.4M18.4 18.4l-1.55-1.55M7.15 7.15 5.6 5.6"/></svg>
        <span>Eficiência</span>
        <span class="metric-value" id="metricEficiencia">—</span>
      </div>
    </section>

    <!-- ============ CARD: ALERTA ============ -->
    <section class="card center col-alerta">
      <h2>Alerta</h2>
      <div class="alerta-icon-wrap">
        <div class="alerta-icon-circle" id="alertaIconCircle"></div>
        <div class="alerta-title" id="alertaTitle">—</div>
      </div>
      <div class="alerta-desc" id="alertaDesc"></div>
    </section>

    <!-- ============ CARD: AÇÕES RECOMENDADAS ============ -->
    <section class="card center col-acoes">
      <h2>Ações Recomendadas</h2>
      <div class="acoes-list" id="acoesList"></div>
    </section>

    <!-- ============ CARD: TEMPERATURA ============ -->
    <section class="card center col-temp">
      <h2>Temperatura</h2>
      <div class="temp-value-row">
        <span class="temp-value" id="tempValue">—</span>
        <svg id="tempThermo" width="20" height="34" viewBox="0 0 20 34" fill="none">
          <rect x="7" y="2" width="6" height="20" rx="3" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="10" cy="27" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <line x1="15" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="1.4"/>
          <line x1="15" y1="11" x2="18" y2="11" stroke="currentColor" stroke-width="1.4"/>
          <line x1="15" y1="16" x2="18" y2="16" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </div>
      <div class="temp-caption" id="tempCaption">—</div>
      <div class="progress-track"><div class="progress-fill" id="tempFill" style="width:0%"></div></div>
      <div class="progress-labels"><span>0%</span><span>50%</span><span>100%</span></div>
    </section>

    <!-- ============ CARD: PRESSÃO PNEUMÁTICA ============ -->
    <section class="card center col-press">
      <h2>Pressão Pneumática</h2>
      <div class="press-row">
        <svg class="gauge-wrap" viewBox="0 0 78 46" fill="none">
          <!-- Arco decorativo fixo verde -> amarelo -> vermelho (igual à referência original) -->
          <path d="M9 40A30 30 0 0 1 24 14" stroke="#22C55E" stroke-width="7" stroke-linecap="round"/>
          <path d="M24 14A30 30 0 0 1 54 14" stroke="#EAB308" stroke-width="7" stroke-linecap="round"/>
          <path d="M54 14A30 30 0 0 1 69 40" stroke="#EF4444" stroke-width="7" stroke-linecap="round"/>
          <g id="gaugeNeedle" transform="rotate(-35 39 40)">
            <line x1="39" y1="40" x2="39" y2="13" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          </g>
          <circle cx="39" cy="40" r="4.5" fill="#fff"/>
        </svg>
        <span class="press-value" id="pressValue">—</span>
      </div>
      <div class="press-caption" id="pressCaption">—</div>
      <div class="progress-track"><div class="progress-fill" id="pressFill" style="width:0%; background:#22C55E"></div></div>
      <div class="progress-labels"><span>0</span><span>10</span></div>
    </section>

  </div>

  <!-- ============ OVERLAY: EM MANUTENÇÃO ============ -->
  <div class="maintenance-overlay" id="maintenanceOverlay">
    <div class="maintenance-panel">
      <svg class="maintenance-icon" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="48" fill="#EF4444"/>
        <path d="M50 22a28 28 0 1 0 .1 0z" stroke="#fff" stroke-width="4" fill="none" stroke-dasharray="6 5"/>
        <path d="M38 62l18-18M40 40l18 18" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <path d="M50 34v-6M50 66v6" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <div class="maintenance-kicker">AVISO</div>
      <div class="maintenance-title" id="maintenanceTitle">Em Manutenção</div>
      <div class="maintenance-desc" id="maintenanceDesc">A máquina está em manutenção.<br>Retornaremos em breve!</div>
    </div>
  </div>

</div>

<!-- ====================== PAINEL DE SIMULAÇÃO (DEV) ======================
     Só para testar sem um backend real ligado. Cada botão dispara um
     PAYLOAD como se tivesse chegado do Node.js (ver MOCK_PAYLOADS em
     api.js). Pode apagar esta div + o bloco "PAINEL DE SIMULAÇÃO" do
     api.js sem quebrar nada quando for plugar o backend de verdade.
     ========================================================================= -->
<div class="state-switcher" id="stateSwitcher"></div>

<script src="../js/api.js"></script>
</body>
</html>
